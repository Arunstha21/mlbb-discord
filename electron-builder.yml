appId: com.mlbb.tournament-bot
productName: MLBB Tournament Bot
directories:
  output: dist/installers
  buildResources: assets
files:
  - dist/electron/**/*
  - dist/**/*
  - "!dist/installers/**"
  - ui/**/*
  - data/**/*
npmRebuild: false
includeSubNodeModules: true
asar: false
win:
  target: nsis
  icon: assets/icon.ico
mac:
  target: dmg
  icon: assets/icon.icns
